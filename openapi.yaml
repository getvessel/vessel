openapi: 3.1.0
info:
  title: Vessel
  version: '0.1'
  description: Self-hosted PaaS — turn any bare-metal VPS into your own private Vercel
    & Railway.
servers:
- url: http://localhost:8080
  description: Local development.
paths:
  /api/auth/signup:
    post:
      tags:
      - Authentication
      summary: Signup
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
              - email
              - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
              type: object
      responses:
        '201':
          description: User created.
        '400':
          $ref: "#/components/responses/400"
  /api/auth/signin:
    post:
      tags:
      - Authentication
      summary: Signin
      operationId: signin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
              - email
              - password
              properties:
                email:
                  type: string
                password:
                  type: string
              type: object
      responses:
        '200':
          description: JWT token returned.
        '401':
          $ref: "#/components/responses/401"
  /api/auth/me:
    get:
      tags:
      - Authentication
      summary: Me
      operationId: getMe
      responses:
        '200':
          description: User profile.
        '401':
          $ref: "#/components/responses/401"
      security:
      - bearerAuth: []
  /api/projects:
    get:
      tags:
      - Projects
      summary: List projects
      operationId: listProjects
      responses:
        '200':
          description: List of projects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        '401':
          $ref: "#/components/responses/401"
      security:
      - bearerAuth: []
    post:
      tags:
      - Projects
      summary: Create project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                name:
                  type: string
                description:
                  type: string
              type: object
      responses:
        '201':
          description: Project created.
        '400':
          $ref: "#/components/responses/400"
        '401':
          $ref: "#/components/responses/401"
      security:
      - bearerAuth: []
  /api/projects/{id}:
    get:
      tags:
      - Projects
      summary: Get project
      operationId: getProject
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Project details.
        '404':
          $ref: "#/components/responses/404"
      security:
      - bearerAuth: []
    delete:
      tags:
      - Projects
      summary: Delete project
      operationId: deleteProject
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Project deleted.
        '404':
          $ref: "#/components/responses/404"
      security:
      - bearerAuth: []
  /api/projects/{id}/deploy:
    post:
      tags:
      - Projects
      summary: Deploy project
      operationId: deployProject
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Deployment started.
        '404':
          $ref: "#/components/responses/404"
      security:
      - bearerAuth: []
  /api/projects/{id}/domains:
    get:
      tags:
      - Domains
      summary: List domains
      operationId: listDomains
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: List of custom domains.
      security:
      - bearerAuth: []
    post:
      tags:
      - Domains
      summary: Add domain
      operationId: addDomain
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                domainName:
                  type: string
                pathPrefix:
                  type: string
                  default: /
              type: object
      responses:
        '201':
          description: Domain added.
      security:
      - bearerAuth: []
  /api/databases:
    get:
      tags:
      - Databases
      summary: List databases
      operationId: listDatabases
      responses:
        '200':
          description: List of managed databases.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Database"
      security:
      - bearerAuth: []
    post:
      tags:
      - Databases
      summary: Create database
      operationId: createDatabase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
              - name
              - engine
              properties:
                name:
                  type: string
                engine:
                  type: string
                  enum:
                  - postgres
                  - mysql
                  - redis
                  - mongodb
              type: object
      responses:
        '201':
          description: Database created.
        '400':
          $ref: "#/components/responses/400"
      security:
      - bearerAuth: []
  /api/git/connect:
    post:
      tags:
      - Git
      summary: Connect Git provider
      operationId: connectGit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                provider:
                  type: string
                  enum:
                  - github
                  - gitlab
                token:
                  type: string
              type: object
      responses:
        '200':
          description: Connected.
      security:
      - bearerAuth: []
  /api/git/repos:
    get:
      tags:
      - Git
      summary: List repositories
      operationId: listGitRepos
      responses:
        '200':
          description: List of repositories.
      security:
      - bearerAuth: []
  /api/teams:
    get:
      tags:
      - Teams
      summary: List teams
      operationId: listTeams
      responses:
        '200':
          description: List of teams.
      security:
      - bearerAuth: []
    post:
      tags:
      - Teams
      summary: Create team
      operationId: createTeam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
              - name
              properties:
                name:
                  type: string
              type: object
      responses:
        '201':
          description: Team created.
      security:
      - bearerAuth: []
  /api/settings:
    get:
      tags:
      - Settings
      summary: Get server settings
      operationId: getServerSettings
      responses:
        '200':
          description: Server settings.
      security:
      - bearerAuth: []
  /ws/terminal/{id}:
    get:
      tags:
      - Terminal
      summary: WebSocket terminal
      operationId: terminal
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '101':
          description: WebSocket upgrade.
      security:
      - bearerAuth: []
components:
  schemas:
    Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Database:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        engine:
          type: string
        version:
          type: string
        port:
          type: integer
        status:
          type: string
        createdAt:
          type: string
          format: date-time
  responses:
    '400':
      description: Bad request.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    '401':
      description: Unauthenticated.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    '404':
      description: Resource not found.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: JWT token from /api/auth/signin.
tags:
- name: Authentication
- name: Projects
- name: Domains
- name: Databases
- name: Git
- name: Teams
- name: Settings
- name: Terminal
