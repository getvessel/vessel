services:
  vessl:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/vesslhq/vessl:${VESSL_VERSION:-latest}
    container_name: vessl-control-plane
    restart: unless-stopped
    ports:
      - "8080:8080" # API and Dashboard GUI
      - "80:80" # Automatic reverse proxy HTTP
      - "443:443" # Automatic reverse proxy HTTPS / TLS
    env_file:
      - .env
    environment:
      - PORT=8080
      - VESSL_DATA_DIR=/var/www/vessl/data
      - VESSL_STATIC_DIR=/var/www/vessl/dashboard/dist
      - VESSL_TLS_EMAIL=${VESSL_TLS_EMAIL:-admin@vessl.local}
    volumes:
      - vessl_data:/var/www/vessl/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - vessl-network

volumes:
  vessl_data:
    name: vessl_data

networks:
  vessl-network:
    name: vessl-network
    driver: bridge
